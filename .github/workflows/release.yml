name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    permissions:
      id-token: write

    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Uncomment when test projects are added
      # - name: Run unit smoke tests (non-blocking)
      #   continue-on-error: true
      #   run: dotnet test -c Release --no-build --verbosity minimal

      - name: Pack
        run: |
          for proj in src/**/CodeYield.*.csproj; do
            echo "Packing $proj"
            dotnet pack "$proj" -c Release -o ./artifacts --no-build
          done

      - name: NuGet login (OIDC → temp API key)
        if: github.ref_type == 'tag'
        uses: NuGet/login@v1
        id: login
        with:
          user: celsojr

      - name: Publish to NuGet.org
        if: github.ref_type == 'tag'
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish to GitHub Packages
        if: github.ref_type == 'tag'
        env:
          GH_PACKAGES_PAT: ${{ secrets.GH_PACKAGES_PAT }}
        run: |
          dotnet nuget add source \
            --username celsojr \
            --password $GH_PACKAGES_PAT \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/celsojr/index.json"

          dotnet nuget push ./artifacts/*.nupkg \
            -k $GH_PACKAGES_PAT \
            -s github \
            --skip-duplicate
